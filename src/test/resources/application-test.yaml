spring:
  application:
    name: pokemart-api-test

  # Valores dummy. O Testcontainers (AbstractIntegrationTest) vai sobrescrever isso em tempo de execução!
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password

  data:
    redis:
      host: localhost
      port: 6379
      password: "" # Sem senha no Redis do Testcontainers

logging:
  level:
    "[org.testcontainers]": INFO # Vai te mostrar no console quando o Docker estiver subindo a imagem
    "[org.springframework.data.neo4j.cypher]": DEBUG # Útil para ver as queries do teste

api:
  security:
    token:
      secret: "segredoteste123456789012345678901234567890" # Segredo fixo para gerar JWTs nos testes

rate-limit:
  capacity: 50        
  minutes: 1          
  login-capacity: 10  
  login-minutes: 1    