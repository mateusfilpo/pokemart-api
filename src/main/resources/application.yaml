spring:
  application:
    name: pokemart-api

  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}

  data:
    redis:
      host: redis-11873.c12.us-east-1-4.ec2.cloud.redislabs.com
      port: 11873
      # username: default
      password: ${REDIS_PASSWORD}
      # ssl:
      # enabled: true

logging:
  level:
    "[org.springframework.data.neo4j]": INFO
    "[org.springframework.data.neo4j.cypher]": DEBUG
    "[org.springframework.cache]": TRACE

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key-pokemon-2026}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method