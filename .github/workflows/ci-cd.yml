name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: Integração Contínua (Build & Test)
  # ==========================================
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean verify
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: ci-test-secret-key-2026

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pokemart-api-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ==========================================
  # JOB 2: Entrega Contínua (Deploy na GCP)
  # ==========================================
  deploy:
    name: Deploy to GCP VM
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: pokemart-api-jar
          path: target/

      - name: Copy JAR to VM via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "target/*.jar"
          target: "/tmp/pokemart-deploy"
          strip_components: 1

      - name: Restart Service via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/pokemart
            sudo mv /tmp/pokemart-deploy/*.jar /opt/pokemart/app.jar
            sudo rm -rf /tmp/pokemart-deploy
            sudo chown www-data:www-data /opt/pokemart/app.jar
            sudo chmod 644 /opt/pokemart/app.jar
            sudo systemctl restart pokemart-api
            sudo systemctl status pokemart-api --no-pager
